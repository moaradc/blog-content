# PagesCMS 配置 - moaradc/blog-content
# 文档: https://pagescms.org/docs/configuration/
#
# 关键：正文字段必须命名为 `body`，PagesCMS 才会将其写为 markdown 正文
# （frontmatter 下方），而不是 frontmatter 字段。
#
# 访问编辑器: https://pagescms.org/moaradc/blog-content

media:
  input: docs/img
  output: /img
  rename: safe
  extensions: [png, jpg, jpeg, webp, gif, svg]

# 仓库级 Actions（显示在 PagesCMS 侧边栏）
# 手动触发 generate-rss.yml 生成 RSS 订阅
# posts.json 在 push 时自动生成，不需要手动触发
actions:
  - name: generate-rss
    label: 生成 RSS
    workflow: generate-rss.yml
    ref: main
    confirm:
      title: 生成 RSS？
      message: 将扫描所有文章并重新生成 rss.xml。
      button: 生成

content:
  - name: posts
    label: 文章
    type: collection
    path: docs/posts
    # filename.field: true 让用户在编辑器中直接输入文件名（如 102）
    # 文件名即文章 ID，不需要额外的 id 字段
    filename:
      template: "{primary}.md"
      field: true
    view:
      fields: [title, date, category, type]
      primary: title
    fields:
      - name: title
        label: 标题
        type: string
        required: true

      - name: date
        label: 发布日期
        type: date
        required: true
        options:
          format: yyyy-MM-dd HH:mm
          time: true

      - name: last_modified
        label: 最后修改
        type: date
        options:
          format: yyyy-MM-dd HH:mm
          time: true
        description: "最后修改时间，编辑文章时更新。留空则用发布日期。"

      # body 字段：PagesCMS 特殊字段名，自动写为 markdown 正文（frontmatter 下方）
      - name: body
        label: 正文
        type: rich-text
        description: "Markdown 正文。type=note 时会直接在首页列表渲染；普通文章点击进入详情页显示。"

      - name: desc
        label: 摘要
        type: text
        description: "文章简短描述，显示在列表卡片和搜索结果中。"

      - name: category
        label: 分类
        type: select
        list: true
        options:
          values: [技术, 闲谈, 说说, 生活, 杂项, Demo]

      - name: tags
        label: 标签
        type: string
        list: true

      - name: author
        label: 作者
        type: select
        default: Admin
        options:
          values: [Admin, Lamb, Anonymous]

      - name: coverImage
        label: 封面图（上传）
        type: image

      - name: image
        label: 封面图（URL）
        type: string
        description: "外部图片 URL。与'封面图（上传）'二选一。"

      # boolean 字段不设 default，未勾选时 PagesCMS 不会写入 frontmatter
      # 这样 frontmatter 更干净（只有 true 时才出现）
      - name: pinned
        label: 置顶
        type: boolean

      - name: locked
        label: 锁定
        type: boolean

      - name: draft
        label: 草稿
        type: boolean

      - name: type
        label: 类型
        type: select
        options:
          values: ["", note, gallery]
        description: "留空=普通文章；note=说说；gallery=图集。"

      - name: content_url
        label: 外部内容 URL
        type: string
