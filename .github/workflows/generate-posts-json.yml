name: Generate posts.json

# 被 on-post-upload.yml 触发（不接受 push，避免循环）
# PagesCMS 上传 → on-post-upload.yml 替换 /img/ → 触发此 workflow
on:
  workflow_dispatch:
    inputs:
      payload:
        description: Trigger payload
        required: false
        type: string
        default: ""

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Clean frontmatter
        run: node clean-frontmatter.js

      - name: Generate posts.json
        run: node generate-posts.js

      - name: Commit and push if changed
        run: |
          git config user.name "moaradc"
          git config user.email "moara@foxmail.com"
          git add -A
          if git diff --cached --quiet; then
            echo "ℹ️  无变化，跳过提交"
          else
            git commit -m "chore: auto-clean frontmatter + generate posts.json [skip ci]"
            git push
            echo "✅ 已提交"
          fi
