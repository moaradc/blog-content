name: Generate posts.json

# 触发条件：push 到 main 时（posts/ 目录或脚本有改动）
# 自动生成 posts.json，不需要手动触发
on:
  push:
    branches: [main]
    paths:
      - "docs/posts/**"
      - "generate-posts.js"
      - "clean-frontmatter.js"
      - ".github/workflows/generate-posts-json.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Clean frontmatter
        env:
          SITE_URL: ${{ vars.SITE_URL }}
        run: node clean-frontmatter.js

      - name: Generate posts.json
        run: node generate-posts.js

      - name: Commit and push if changed
        run: |
          git config user.name "moaradc"
          git config user.email "moara@foxmail.com"
          git add -A
          if git diff --cached --quiet; then
            echo "ℹ️  无变化，跳过提交"
          else
            git commit -m "chore: auto-clean frontmatter + generate posts.json [skip ci]"
            git push
            echo "✅ 已提交"
          fi
