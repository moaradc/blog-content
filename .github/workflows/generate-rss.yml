name: Generate RSS

# 只手动触发（在 PagesCMS Actions 面板或 GitHub Actions 页面点击运行）
# PagesCMS 触发时会发送 payload 参数（包含触发上下文信息）
on:
  workflow_dispatch:
    inputs:
      payload:
        description: Pages CMS payload as JSON
        required: true
        type: string

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate rss.xml
        run: node generate-rss.js

      - name: Commit and push if changed
        run: |
          git config user.name "moaradc"
          git config user.email "moara@foxmail.com"
          git add rss.xml
          if git diff --cached --quiet; then
            echo "ℹ️  rss.xml 无变化，跳过提交"
          else
            git commit -m "chore: regenerate rss.xml [skip ci]"
            git push
            echo "✅ rss.xml 已提交"
          fi
