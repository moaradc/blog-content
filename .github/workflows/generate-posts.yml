name: Generate posts.json and rss.xml

# 触发条件：push 到 main 时（posts/ 目录或脚本有改动）
on:
  push:
    branches: [main]
    paths:
      - "posts/**"
      - "generate-posts.js"
      - "clean-frontmatter.js"
      - ".github/workflows/generate-posts.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Clean frontmatter
        run: node clean-frontmatter.js

      - name: Generate posts.json and rss.xml
        run: node generate-posts.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "ℹ️  无变化，跳过提交"
          else
            git commit -m "chore: auto-clean frontmatter + generate posts.json/rss.xml [skip ci]"
            git push
            echo "✅ 已提交"
          fi
